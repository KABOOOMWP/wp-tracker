<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP Padel Tracker – Privacy Policies</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      line-height: 1.7;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      padding: 2.5rem 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #555; margin-bottom: 2rem; }
    .cards { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      display: block;
      text-decoration: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: #bbb; }
    .card-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 0.1rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }
    .badge-android { background: #e8f5e9; color: #2e7d32; }
    .badge-ios     { background: #e3f2fd; color: #1565c0; }
    .card-title { font-size: 1rem; font-weight: 600; color: #111; margin-bottom: 0.15rem; }
    .card-desc  { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WP Padel Tracker</h1>
    <p>Privacy policies for each platform.</p>
    <div class="cards">
      <a class="card" href="privacy-policy-android.html">
        <span class="card-badge badge-android">Wear OS</span>
        <div class="card-title">Privacy Policy – Google Play</div>
        <div class="card-desc">For the Android / Wear OS version of the app.</div>
      </a>
      <a class="card" href="privacy-policy-ios.html">
        <span class="card-badge badge-ios">watchOS</span>
        <div class="card-title">Privacy Policy – App Store</div>
        <div class="card-desc">For the Apple Watch / watchOS version of the app.</div>
      </a>
    </div>
  </div>
</body>
</html>
